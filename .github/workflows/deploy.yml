name: Pumpkin Application CI/CD

on:
  push:
    branches:
      - dev
      - main

    paths:
      - "helm/**"
      - "Dockerfile"
      - "src/**"
      - ".github/workflows/deploy.yml"

env:
  IMAGE_NAME: pumpkin-api
  KEYVAULT_NAME: pumpkin-kv

jobs:

# ==================================================
# STAGE 1 — DevSecOps Security Scans
# ==================================================
  security:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # Dependency Scan
    - name: OWASP Dependency Check
      uses: dependency-check/Dependency-Check_Action@main
      with:
        project: "pumpkin-api"
        path: "."
        format: "HTML"

    # Filesystem Scan
    - name: Trivy Filesystem Scan
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: fs
        scan-ref: .

# ==================================================
# STAGE 2 — Dockerfile Lint
# ==================================================
  dockerfile-lint:
    runs-on: ubuntu-latest
    needs: security

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Dockerfile Lint
      uses: hadolint/hadolint-action@v3.1.0
      with:
        dockerfile: Dockerfile

# ==================================================
# STAGE 3 — Build Image
# ==================================================
  build:
    runs-on: ubuntu-latest
    needs: dockerfile-lint

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Azure Login
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Get Secrets from Key Vault
      uses: azure/get-keyvault-secrets@v1
      with:
        keyvault: ${{ env.KEYVAULT_NAME }}
        secrets: acr-login-server

    - name: Login to ACR
      run: |
        az acr login --name ${{ steps.kv.outputs.acr-login-server }}

    - name: Build Docker Image
      run: |
        docker build -t ${{ steps.kv.outputs.acr-login-server }}/${{ env.IMAGE_NAME }}:${{ github.sha }} .

    - name: Push Docker Image
      run: |
        docker push ${{ steps.kv.outputs.acr-login-server }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

# ==================================================
# STAGE 4 — Container Image Scan
# ==================================================
  image-scan:
    runs-on: ubuntu-latest
    needs: build

    steps:
    - name: Trivy Image Scan
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
        severity: CRITICAL,HIGH
        exit-code: "1"

# ==================================================
# STAGE 5 — Push Image
# ==================================================
  push-image:
    runs-on: ubuntu-latest
    needs: image-scan

    steps:
    - name: Azure Login
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Push Docker Image
      run: |
        docker push pumpkindevacr.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}

# ==================================================
# STAGE 6 — Deploy to AKS with Helm
# ==================================================
  deploy:
    runs-on: ubuntu-latest
    needs: push-image

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Azure Login
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Install kubectl
      uses: azure/setup-kubectl@v3

    - name: Install Helm
      uses: azure/setup-helm@v4

    - name: Connect to AKS
      run: |
        if [[ "${GITHUB_REF}" == "refs/heads/dev" ]]; then
          az aks get-credentials \
            --resource-group pumpkin-dev-rg \
            --name pumpkin-dev-aks \
            --overwrite-existing
        else
          az aks get-credentials \
            --resource-group pumpkin-prod-rg \
            --name pumpkin-prod-aks \
            --overwrite-existing
        fi

    - name: Helm Deploy
      run: |
        if [[ "${GITHUB_REF}" == "refs/heads/dev" ]]; then
          helm upgrade --install pumpkin-api ./helm/pumpkin-api \
            --atomic \
            --set image.repository=pumpkindevacr.azurecr.io/${{ env.IMAGE_NAME }} \
            --set image.tag=${{ github.sha }} \
            -f helm/pumpkin-api/values-dev.yaml
        else
          helm upgrade --install pumpkin-api ./helm/pumpkin-api \
            --atomic \
            --set image.repository=pumpkindevacr.azurecr.io/${{ env.IMAGE_NAME }} \
            --set image.tag=${{ github.sha }} \
            -f helm/pumpkin-api/values-prod.yaml
        fi