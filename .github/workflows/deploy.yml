name: Pumpkin Application CI/CD

on:
  push:
    branches:
      - dev
      - main

    paths:
      - "helm/**"
      - "Dockerfile"
      - "src/**"
      - ".github/workflows/deploy.yml"

env:
  IMAGE_NAME: pumpkin-api
  KEYVAULT_NAME: pumpkin-kv
  DEV_ACR_NAME: pumpkindevacr
  DEV_ACR_LOGIN_SERVER: pumpkindevacr.azurecr.io
  PROD_ACR_NAME: pumpkinprodacr
  PROD_ACR_LOGIN: pumpkinprodacr.azurecr.io

jobs:

# ==================================================
# STAGE 1 — DevSecOps Security Scans
# ==================================================
  security:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: pumpkin-api
          path: .
          format: HTML

      - name: Trivy Filesystem Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .

# ==================================================
# STAGE 2 — Dockerfile Lint
# ==================================================
  dockerfile-lint:
    runs-on: ubuntu-latest
    needs: security

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Dockerfile Lint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile

# ==================================================
# STAGE 3 — Build and Push Docker Image
# ==================================================
  build:
    runs-on: ubuntu-latest
    needs: dockerfile-lint

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # ---------------------------------
      # Select ACR based on branch
      # ---------------------------------
      - name: Select ACR
        run: |
          if [[ "${GITHUB_REF}" == "refs/heads/dev" ]]; then
            echo "ACR_NAME=pumpkindevacr" >> $GITHUB_ENV
            echo "ACR_LOGIN_SERVER=pumpkindevacr.azurecr.io" >> $GITHUB_ENV
          else
            echo "ACR_NAME=pumpkinprodacr" >> $GITHUB_ENV
            echo "ACR_LOGIN_SERVER=pumpkinprodacr.azurecr.io" >> $GITHUB_ENV
          fi

      # ---------------------------------
      # Login to ACR
      # ---------------------------------
      - name: Login to ACR
        run: |
          az acr login --name $ACR_NAME

      # ---------------------------------
      # Build Docker Image
      # ---------------------------------
      - name: Build Docker Image
        run: |
          docker build -t $ACR_LOGIN_SERVER/$IMAGE_NAME:${{ github.sha }} .

      # ---------------------------------
      # Push Docker Image
      # ---------------------------------
      - name: Push Docker Image
        run: |
          docker push $ACR_LOGIN_SERVER/$IMAGE_NAME:${{ github.sha }}
# ==================================================
# STAGE 4 — Push Image to ACR
# ==================================================




# ==================================================
# STAGE 5 — Container Image Scan
# ==================================================
  image-scan:
    runs-on: ubuntu-latest
    needs: build

    steps:

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # Select correct ACR based on branch
      - name: Select ACR
        run: |
          if [[ "${GITHUB_REF}" == "refs/heads/dev" ]]; then
            echo "ACR_NAME=$DEV_ACR_NAME" >> $GITHUB_ENV
            echo "ACR_LOGIN_SERVER=$DEV_ACR_LOGIN_SERVER" >> $GITHUB_ENV
          else
            echo "ACR_NAME=$PROD_ACR_NAME" >> $GITHUB_ENV
            echo "ACR_LOGIN_SERVER=$PROD_ACR_LOGIN" >> $GITHUB_ENV
          fi

      - name: Login to ACR
        run: |
          az acr login --name $ACR_NAME

      - name: Trivy Image Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          severity: CRITICAL,HIGH
          exit-code: "0"

# ==================================================
# STAGE 6 — Deploy to DEV AKS
# ==================================================
  deploy-dev:
    runs-on: ubuntu-latest
    needs: image-scan
    if: github.ref == 'refs/heads/dev'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v3

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Connect to DEV AKS
        run: |
          az aks get-credentials \
            --resource-group pumpkin-dev-rg \
            --name pumpkin-dev-aks \
            --overwrite-existing

      - name: Helm Deploy DEV
        run: |
          helm upgrade --install pumpkin-api ./helm/pumpkin-api \
            --wait \
            --timeout 10m \
            --rollback-on-failure \
            --set image.repository=$ACR_LOGIN_SERVER/$IMAGE_NAME \
            --set image.tag=${{ github.sha }} \
            -f helm/pumpkin-api/values-dev.yaml


# ==================================================
# STAGE 7 — Deploy to PROD AKS
# ==================================================
  deploy-prod:
    runs-on: ubuntu-latest
    needs: image-scan
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v3

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Connect to PROD AKS
        run: |
          az aks get-credentials \
            --resource-group pumpkin-prod-rg \
            --name pumpkin-prod-aks \
            --overwrite-existing

      - name: Helm Deploy PROD
        run: |
          helm upgrade --install pumpkin-api ./helm/pumpkin-api \
            --wait \
            --timeout 10m \
            --rollback-on-failure \
            --set image.repository=$ACR_LOGIN_SERVER/$IMAGE_NAME \
            --set image.tag=${{ github.sha }} \
            -f helm/pumpkin-api/values-prod.yaml